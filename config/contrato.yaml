    primer_anio: { produccion: 0.25, mantenimiento: 0.05 }
    segundo_anio_en_adelante: { produccion: 0.20, mantenimiento: 0.05 }
  "ASISA TRAVEL AND YOU":
    primer_anio: { produccion: 0.20, mantenimiento: 0.00 }
    segundo_anio_en_adelante: { produccion: 0.00, mantenimiento: 0.00 }
  "ASISA INTEGRAL":
    primer_anio: { produccion: 0.20, mantenimiento: 0.05 }
    segundo_anio_en_adelante: { produccion: 0.20, mantenimiento: 0.05 }
  "ASISA PYMES":
    primer_anio: { produccion: 0.20, mantenimiento: 0.05 }
    segundo_anio_en_adelante: { produccion: 0.15, mantenimiento: 0.05 }
  "ACCIDENTES":
    primer_anio: { produccion: 0.25, mantenimiento: 0.20 }
    segundo_anio_en_adelante: { produccion: 0.25, mantenimiento: 0.20 }
  "DECESOS":
    primer_anio: { produccion: 0.60, mantenimiento: 0.20 }
    segundo_anio_en_adelante: { produccion: 0.60, mantenimiento: 0.20 }
  "DENTAL":
    primer_anio: { produccion: 0.25, mantenimiento: 0.10 }
    segundo_anio_en_adelante: { produccion: 0.20, mantenimiento: 0.10 }
  "HOSPITALIZACION":
    primer_anio: { produccion: 0.25, mantenimiento: 0.05 }
    segundo_anio_en_adelante: { produccion: 0.20, mantenimiento: 0.05 }
  "MASCOTAS":
    primer_anio: { produccion: 0.30, mantenimiento: 0.15 }
    segundo_anio_en_adelante: { produccion: 0.30, mantenimiento: 0.15 }

# -----------------------------------------------------------------------------
# Comisiones por producto — entidad ASISA VIDA, Anexo I
# -----------------------------------------------------------------------------
comisiones_vida:
  "ASISA VIDA TRANQUILIDAD":
    produccion: 0.60
    mantenimiento: 0.20
  "ASISA VIDA TRANQUILIDAD HIPOTECA":
    produccion: 0.40
    mantenimiento: 0.45
  "ASISA VIDA ACCIDENTES SENIOR":
