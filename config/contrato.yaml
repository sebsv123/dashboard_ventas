# =============================================================================
# Configuración del contrato de Agente Exclusivo — ASISA / ASISA VIDA
# Vigente desde: 2025-12-01
#
# Este fichero es la ÚNICA fuente de verdad sobre porcentajes y reglas.
# Si ASISA cambia condiciones (avisan con 2 meses de antelación según el
# contrato), edita este fichero y versiónalo en git — así queda trazabilidad
# de qué reglas aplicaban a qué periodo.
# =============================================================================

vigencia:
  inicio_contrato: "2025-12-01"
  meses_formacion: 2          # mes 1 (dic) y mes 2 (ene): rappel plano, sin objetivo

fiscal:
  retencion_irpf: 0.15        # se aplica sobre (comisiones + rappel) juntos

entidades:
  asisa_salud:
    razon_social_cif: "A08169294"
    nombre: "ASISA, Asistencia Sanitaria Interprovincial de Seguros, S.A."
    tiene_rappel: true
  asisa_vida:
    razon_social_cif: "A87425070"
    nombre: "ASISA VIDA SEGUROS, S.A.U."
    tiene_rappel: false       # el Anexo de rappel no existe en este contrato

# -----------------------------------------------------------------------------
# Comisiones por producto — entidad ASISA (Salud), Anexo I
# -----------------------------------------------------------------------------
comisiones_salud:
